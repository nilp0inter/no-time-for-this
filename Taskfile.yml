version: '3'

tasks:
  build:
    desc: Build the watchface for all platforms
    cmds:
      - nix build
    sources:
      - src/**/*
      - package.json
      - wscript

  emulator:
    desc: Build and run in the Pebble emulator (basalt)
    cmds:
      - pebble build
      - pebble install --emulator basalt

  emulator:aplite:
    desc: Build and run in the Pebble emulator (aplite)
    cmds:
      - pebble build
      - pebble install --emulator aplite

  logs:
    desc: Show live logs from the emulator
    cmds:
      - pebble logs

  install:
    desc: Install on a real Pebble watch via phone IP
    vars:
      PHONE_IP: '{{.PHONE_IP}}'
    cmds:
      - pebble build
      - pebble install --phone {{.PHONE_IP}}
    preconditions:
      - sh: test -n "{{.PHONE_IP}}"
        msg: "Usage: task install PHONE_IP=<ip_address>"

  sideload:
    desc: Copy the .pbw file to the current directory for manual sideloading
    deps: [build]
    cmds:
      - cp result/no-time-for-this.pbw ./no-time-for-this.pbw
      - echo "Copied to ./no-time-for-this.pbw — transfer to your phone and open with the Pebble app"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build result no-time-for-this.pbw
